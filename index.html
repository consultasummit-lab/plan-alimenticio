  .pl-supp .t{font-weight:600;font-size:13px;}
  .pl-supp .s{font-size:11px;color:#6b6b64;}
  .pl-btn{background:var(--pl-green);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;}

function antroSorted(){ return state.antro.slice().sort(function(a,b){ return a.date<b.date?-1:1; }); }
function latestValue(field){
  var recs = antroSorted();
  for(var i=recs.length-1;i>=0;i--){ if(recs[i][field]!==null && recs[i][field]!==undefined && recs[i][field]!=='') return {value:recs[i][field], date:recs[i].date}; }
  return null;
}
async function loadAntro(){
  var payload = await fsGet('antropometria');
  state.antro = payload || ANTRO_SEED.slice();
  if(!payload) await saveAntro();
  var jun30 = state.antro.filter(function(r){return r.date==='2026-06-30';})[0];
  var jun16 = state.antro.filter(function(r){return r.date==='2026-06-16';})[0];

    jun30.talla = jun16.talla; jun30.abdomen = jun16.abdomen; jun30.cadera = jun16.cadera; jun30.cuello = jun16.cuello;

}

function formatApptLabel(v){
  if(!v) return '—';
  var d = new Date(v);
  if(isNaN(d.getTime())) return v;
  var dias=['dom','lun','mar','mié','jue','vie','sáb'];
  var meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var h = d.getHours(); var ampm = h>=12?'pm':'am'; var h12 = h%12; if(h12===0) h12=12;
  var mins = ('0'+d.getMinutes()).slice(-2);
  return dias[d.getDay()]+' '+d.getDate()+' '+meses[d.getMonth()]+' · '+h12+':'+mins+' '+ampm;
}
function getEditKey(){ return localStorage.getItem('pl_edit_key'); }
function ensureEditKey(){
  var k = localStorage.getItem('pl_edit_key');
  if(!k){
    k = window.prompt('Ingresa tu frase clave para editar (déjalo en blanco para seguir solo viendo):');
    if(k){ localStorage.setItem('pl_edit_key', k); }
  }
  return k;
}
function clearEditKey(){ localStorage.removeItem('pl_edit_key'); toast('Modo edición desactivado en este dispositivo'); renderStats(); }
async function fsGet(id){
  try{
    var snap = await plDb.collection(PL_COL).doc(id).get();
    if(!snap.exists) return null;
    var data = snap.data();
    return (data && 'payload' in data) ? data.payload : null;
  }catch(e){ console.error('fsGet', id, e); return null; }
}
async function fsSet(id, payload){
  var k = ensureEditKey();
  if(!k){ toast('No guardado — modo solo lectura'); return false; }
  try{
    await plDb.collection(PL_COL).doc(id).set({payload: payload, editKey: k, updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
    return true;
  }catch(e){
    console.error('fsSet', id, e);
    toast('No se pudo guardar — frase clave incorrecta o sin conexión');
    localStorage.removeItem('pl_edit_key');
    return false;
  }
}

function todayKey(d){
  d = d || new Date();
  var y = d.getFullYear();
  var m = ('0'+(d.getMonth()+1)).slice(-2);
  var day = ('0'+d.getDate()).slice(-2);
  return y+'-'+m+'-'+day;
}
function dayIndex(d){ d=d||new Date(); var j=d.getDay(); return j===0?6:j-1; }

var state = { weekPlan:null, dailyLog:null, despensaChecked:{}, expressChecked:{}, expressDay:null, meds:[], antro:null, nextAppt:null, tab:'hoy', date:new Date(), localDayFinalized:false };

function defaultWeekPlan(){
  var wp={};
  DAYS.forEach(function(d){ wp[d]={}; MEAL_ORDER.forEach(function(m){ wp[d][m]=0; }); });
  return wp;
}
function defaultDailyLog(){
  var meals={}; MEAL_ORDER.forEach(function(m){meals[m]=false;});
  var supps={}; SUPPS.forEach(function(s){supps[s.id]=false;});
  return {meals:meals, water:0, supps:supps, bp:[], obs:'', exercise:{min:0,kcal:0}};
}

async function loadState(){
  var wp = await fsGet('week-plan');
  state.weekPlan = wp || defaultWeekPlan();
  if(!wp) await saveWeekPlan();
  var desp = await fsGet('despensa-checked');
  state.despensaChecked = desp || {};
  var expressChk = await fsGet('despensa-express-checked');
  state.expressChecked = expressChk || {};
  var meds = await fsGet('meds-list');
  if(meds){ state.meds = migrateMeds(meds); }
  else { state.meds = DEFAULT_MEDS.slice(); await saveMeds(); }
  await loadAntro();
  await loadNextAppt();
  await loadDailyLog();
}
function migrateMeds(list){
  var out=[]; var changed=false;
  list.forEach(function(m){
    if(m.momento){ out.push(m); return; }
    changed=true;
    var notes=(m.notes||'').toLowerCase();
    var hasAm = notes.indexOf('am')!==-1;
    var hasPm = notes.indexOf('pm')!==-1;
    if(hasAm && hasPm){
      out.push({name:m.name, notes:m.notes.replace(/\s*y\s*/i,' — '), momento:'desayuno', done:m.done||false});
      out.push({name:m.name, notes:m.notes.replace(/\s*y\s*/i,' — '), momento:'cena', done:m.done||false});
    } else if(hasAm){ out.push({name:m.name, notes:m.notes, momento:'desayuno', done:m.done||false}); }
    else if(hasPm){ out.push({name:m.name, notes:m.notes, momento:'cena', done:m.done||false}); }
    else { out.push({name:m.name, notes:m.notes, momento:'otro', done:m.done||false}); }
  });
  if(changed) { state.meds=out; saveMeds(); }
  return out;
}
async function loadHistory(n){
  n = n || 7;
  var days=[]; var d=new Date(state.date);
  for(var i=n-1;i>=0;i--){
    var dt=new Date(d); dt.setDate(d.getDate()-i);
    days.push(dt);
  }
  var out=[];
  for(var j=0;j<days.length;j++){
    var entry = await fsGet('daily-'+todayKey(days[j]));
    out.push({date:days[j], key:todayKey(days[j]), label:DAYS[dayIndex(days[j])], entry:entry});
  }
  return out;
}
async function loadDailyLog(){
  var payload = await fsGet('daily-'+todayKey(state.date));
  state.dailyLog = payload || defaultDailyLog();
  var def = defaultDailyLog();
  if(!state.dailyLog.bp) state.dailyLog.bp = def.bp;
  if(typeof state.dailyLog.obs !== 'string') state.dailyLog.obs = def.obs;
  if(!state.dailyLog.exercise) state.dailyLog.exercise = def.exercise;
  if(!state.dailyLog.supps) state.dailyLog.supps = def.supps;
  if(!state.dailyLog.meals) state.dailyLog.meals = def.meals;
  if(typeof state.dailyLog.water !== 'number') state.dailyLog.water = 0;
}
async function saveWeekPlan(){ return fsSet('week-plan', state.weekPlan); }
async function saveDailyLog(){
  var mealsDone = Object.keys(state.dailyLog.meals).filter(function(k){return state.dailyLog.meals[k];}).length;
  var suppsDone = Object.keys(state.dailyLog.supps).filter(function(k){return state.dailyLog.supps[k];}).length;
  state.dailyLog.mealsDone = mealsDone; state.dailyLog.mealsTotal = MEAL_ORDER.length;
  state.dailyLog.suppsDone = suppsDone; state.dailyLog.suppsTotal = SUPPS.length;
  return fsSet('daily-'+todayKey(state.date), state.dailyLog);
}

function renderDespensa(){
  document.getElementById('pl-body').innerHTML = '<div class="pl-card"><p class="pl-empty">Cargando lista de despensa...</p></div>';
  fsGet('week-plan').then(function(savedPlan){
    if(state.tab!=='despensa') return;
    var plan = savedPlan || defaultWeekPlan();
    state.weekPlan = plan;
    var totals = {};
    DAYS.forEach(function(d){
      MEAL_ORDER.forEach(function(mk){
        var opt = mealOption(mk, plan[d][mk]);
        (opt.ing||[]).forEach(function(ing){
          if(OMIT_FROM_SHOP.indexOf(ing.n)!==-1) return;
          var key = ing.n+'|'+ing.u;
          if(!totals[key]) totals[key]={n:ing.n,u:ing.u,q:0};
          totals[key].q += ing.q;
        });
      });
    });
    var grouped = {};
    Object.keys(totals).forEach(function(k){
      var it = totals[k];
      var dept = deptOf(it.n);
      if(!grouped[dept]) grouped[dept]=[];
      grouped[dept].push(it);
    });
    Object.keys(grouped).forEach(function(d){ grouped[d].sort(function(a,b){return a.n.localeCompare(b.n);}); });

    var html = '<div class="pl-card"><h3>Lista de despensa semanal <button class="pl-btn ghost" id="pl-copy-shop">Copiar lista</button></h3>';
    html += '<p style="font-size:12px;color:#6b6b64;margin-bottom:10px;">Calculada según las opciones guardadas en Semana, organizada por departamento. No incluye suplementos, medicamentos, alimentos libres (especias, café, limón para condimentar, etc.) ni cantidades "al gusto".</p>';

function renderDespensaExpress(){
  document.getElementById('pl-body').innerHTML = '<div class="pl-card"><p class="pl-empty">Cargando despensa express...</p></div>';
  if(!state.expressDay){ state.expressDay = tomorrowDayName(); }
  fsGet('week-plan').then(function(savedPlan){
    if(state.tab!=='express') return;
    var plan = savedPlan || defaultWeekPlan();
    state.weekPlan = plan;
    var selDay = state.expressDay;

    var totals = {};
    MEAL_ORDER.forEach(function(mk){
      var opt = mealOption(mk, plan[selDay][mk]);
      (opt.ing||[]).forEach(function(ing){
        if(OMIT_FROM_SHOP.indexOf(ing.n)!==-1) return;
        var key = ing.n+'|'+ing.u;
        if(!totals[key]) totals[key]={n:ing.n,u:ing.u,q:0};
        totals[key].q += ing.q;
      });
    });
    var grouped = {};
    Object.keys(totals).forEach(function(k){
      var it = totals[k];
      var dept = deptOf(it.n);
      if(!grouped[dept]) grouped[dept]=[];

function renderSuplementos(){
  var html = '';
  MOMENTOS.forEach(function(mo){
    var key=mo[0], label=mo[1];
    var supps = SUPPS.filter(function(s){return s.momento===key;});
    var meds = state.meds.map(function(m,i){return {m:m,i:i};}).filter(function(x){return x.m.momento===key;});
    if(supps.length===0 && meds.length===0) return;
    html += '<div class="pl-card"><h3>'+label+'</h3>';
    supps.forEach(function(s){
      var checked = state.dailyLog.supps[s.id];
      html += '<div class="pl-supp"><input type="checkbox" class="pl-check" data-suppcheck="'+s.id+'" '+(checked?'checked':'')+' style="margin-top:2px;">'+
        '<div><div class="t">'+s.t+'</div><div class="s">'+s.s+'</div></div></div>';
    });

      var m=x.m, i=x.i;

        '<div style="flex:1;"><div class="t">'+m.name+'</div><div class="s">'+(m.notes||'')+'</div></div>'+

    '<input class="pl-text" id="pl-med-notes" placeholder="Dosis / horario" style="flex:2;min-width:140px;">'+

    cb.onchange=function(){
      var id = cb.getAttribute('data-suppcheck');
      var prev = state.dailyLog.supps[id];
      state.dailyLog.supps[id]=cb.checked; render();
      saveDailyLog().then(function(ok){ if(!ok){ state.dailyLog.supps[id]=prev; } render(); if(ok) toast(cb.checked? 'Guardado ✓' : 'Guardado'); });
    };
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-medcheck]'), function(cb){
    cb.onchange=function(){
      var idx = parseInt(cb.getAttribute('data-medcheck'));
      var prev = state.meds[idx].done;
      state.meds[idx].done=cb.checked; render();
      saveMeds().then(function(ok){ if(!ok){ state.meds[idx].done=prev; } render(); if(ok) toast(cb.checked? 'Guardado ✓' : 'Guardado'); });
    };
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-medremove]'), function(b){
    b.onclick=function(){
      var idx = parseInt(b.getAttribute('data-medremove'));
      var removed = state.meds[idx];
      state.meds.splice(idx,1); render();
      saveMeds().then(function(ok){ if(!ok){ state.meds.splice(idx,0,removed); } render(); });
    };

    var n=document.getElementById('pl-med-name').value.trim();
    var no=document.getElementById('pl-med-notes').value.trim();
    var mo=document.getElementById('pl-med-momento').value;

    state.meds.push({name:n,notes:no,momento:mo,done:false}); render();
    saveMeds().then(function(ok){ if(!ok){ state.meds.pop(); } render(); });
  };

function barRow(label, done, total, color, bg){
  var pct = total? Math.round((done/total)*100) : 0;

    '<div style="height:6px;border-radius:999px;background:'+bg+';overflow:hidden;"><div style="height:100%;width:'+pct+'%;background:'+color+';"></div></div></div>';
}

      var e=d.entry;
      html += '<div style="padding:8px 0;border-bottom:1px solid var(--pl-line);">';
      html += '<div style="font-weight:600;font-size:13px;">'+d.label+' · '+d.key+'</div>';
      if(!e){ html += '<p class="pl-empty">Sin registro.</p>'; }
      else {
        html += '<p style="font-size:12px;color:#6b6b64;margin:4px 0 0;">Comidas '+e.mealsDone+'/'+e.mealsTotal+' · Agua '+e.water+'/5 thermos · Suplementos '+e.suppsDone+'/'+e.suppsTotal+
          (e.bp&&e.bp.length? ' · Presión: '+e.bp.map(function(b){return b.sys+'/'+b.dia+' ('+b.pulse+' lpm, '+(b.arm==='derecho'?'der.':'izq.')+')';}).join(', '):'')+
          ((e.exercise&&(e.exercise.min||e.exercise.kcal))? ' · Ejercicio '+e.exercise.min+' min / '+e.exercise.kcal+' kcal':'')+'</p>';
      }
      html += '</div>';
    });
    html += '</div>';
    document.getElementById('pl-body').innerHTML = html;
    var csvBtn = document.getElementById('pl-download-csv');
    if(csvBtn) csvBtn.onclick=function(){ downloadWeeklyCSV(days.slice(-7)); };
    var refreshBtn2 = document.getElementById('pl-refresh-nutri');
    if(refreshBtn2) refreshBtn2.onclick=function(){ renderNutriologa(); };
  });
}

function csvEscape(v){
  v = (v===undefined||v===null)? '' : String(v);
  if(v.indexOf(',')!==-1 || v.indexOf('"')!==-1 || v.indexOf('\n')!==-1){
    v = '"'+v.replace(/"/g,'""')+'"';
  }
  return v;
}
function downloadWeeklyCSV(days7){
  var rows = [['Fecha','Día','Comidas cumplidas','Comidas totales','Agua (thermos)','Suplementos cumplidos','Suplementos totales','Lecturas de presión','Ejercicio (min)','Ejercicio (kcal)','Observaciones']];
  days7.forEach(function(d){
    var e = d.entry;
    if(!e){ rows.push([d.key, d.label, '', '', '', '', '', '', '', '', 'Sin registro']); return; }
    var bpStr = (e.bp && e.bp.length)? e.bp.map(function(b){return b.sys+'/'+b.dia+' ('+b.pulse+' lpm, '+(b.arm==='derecho'?'brazo derecho':'brazo izquierdo')+') '+b.time;}).join(' | ') : '';
    rows.push([d.key, d.label, e.mealsDone, e.mealsTotal, e.water, e.suppsDone, e.suppsTotal, bpStr, (e.exercise?e.exercise.min:0), (e.exercise?e.exercise.kcal:0), e.obs||'']);
  });
  var csv = rows.map(function(r){ return r.map(csvEscape).join(','); }).join('\r\n');
  var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'reporte_semanal_javier_'+todayKey(state.date)+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  toast('Descargando reporte...');
}

function render(){
  var realToday = todayKey(new Date());
  if(realToday !== todayKey(state.date)){
    state.date = new Date();
    state.localDayFinalized = false;
    loadDailyLog().then(render);
    return;
  }
  renderStats();
  renderNav();
  if(state.tab==='hoy') renderHoy();
  else if(state.tab==='semana') renderSemana();
  else if(state.tab==='despensa') renderDespensa();
  else if(state.tab==='express') renderDespensaExpress();
  else if(state.tab==='equivalentes') renderEquivalentes();
  else if(state.tab==='suplementos') renderSuplementos();
  else if(state.tab==='historial') renderHistorial();
  else if(state.tab==='nutriologa') renderNutriologa();
}

loadState().then(render);

})();
</script>
</body></html>
